name: Deploy website

# Deploys from the `website` branch only, so work on `main` never publishes by
# accident. Run it by hand from the Actions tab with "Run workflow".
on:
  push:
    branches: [website]
    paths: ['website/**', '.github/workflows/deploy-website.yml']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-website
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/dist
          destination_dir: .
